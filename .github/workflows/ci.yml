name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  core:
    name: Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python test dependencies
        run: python -m pip install -e . pytest

      - name: Run release preflight
        run: scripts/preflight.sh

  desktop:
    name: Desktop Web Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/desktop/package-lock.json

      - name: Build desktop frontend
        working-directory: clients/desktop
        run: |
          npm ci
          npm run build

  android:
    name: Android Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build debug APK
        working-directory: clients/android
        run: ./gradlew :app:assembleDebug --console=plain
