name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  release:
    name: Build CLI Release
    runs-on: ubuntu-24.04
    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build release archives
        env:
          SKIRK_OAUTH_CLIENT_ID: ${{ secrets.SKIRK_OAUTH_CLIENT_ID }}
          SKIRK_OAUTH_CLIENT_SECRET: ${{ secrets.SKIRK_OAUTH_CLIENT_SECRET }}
          SKIRK_REQUIRE_BUILTIN_OAUTH: "0"
        run: VERSION="${GITHUB_REF_NAME}" scripts/package_release.sh

      - uses: actions/upload-artifact@v7
        with:
          name: cli-release
          path: |
            dist/skirk-*.tar.gz
            dist/skirk-*.zip
            dist/SHA256SUMS
          if-no-files-found: error

  android:
    name: Build Signed Android Client
    runs-on: ubuntu-24.04
    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Android NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.0.12077973"

      - name: Decode or Generate Android release keystore
        env:
          SKIRK_ANDROID_KEYSTORE_BASE64: ${{ secrets.SKIRK_ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/skirk-android-signing"
          if [ -n "${SKIRK_ANDROID_KEYSTORE_BASE64}" ]; then
            printf '%s' "$SKIRK_ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/skirk-android-signing/release.jks"
            echo "USING_CUSTOM_KEYSTORE=1" >> "$GITHUB_ENV"
          else
            echo "SKIRK_ANDROID_KEYSTORE_BASE64 is empty. Generating fallback self-signed release keystore..."
            keytool -genkeypair -v -keystore "$RUNNER_TEMP/skirk-android-signing/release.jks" -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass fallbackpassword -keypass fallbackpassword -dname "CN=Skirk, O=Skirk, C=US"
            echo "USING_CUSTOM_KEYSTORE=0" >> "$GITHUB_ENV"
          fi

      - name: Build signed release APK
        working-directory: clients/android
        env:
          SKIRK_ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/skirk-android-signing/release.jks
          SKIRK_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.SKIRK_ANDROID_KEYSTORE_PASSWORD }}
          SKIRK_ANDROID_KEY_ALIAS: ${{ secrets.SKIRK_ANDROID_KEY_ALIAS }}
          SKIRK_ANDROID_KEY_PASSWORD: ${{ secrets.SKIRK_ANDROID_KEY_PASSWORD }}
        run: |
          if [ "$USING_CUSTOM_KEYSTORE" = "1" ]; then
            test -n "$SKIRK_ANDROID_KEYSTORE_PASSWORD"
            test -n "$SKIRK_ANDROID_KEY_ALIAS"
            test -n "$SKIRK_ANDROID_KEY_PASSWORD"
            ./gradlew :app:assembleRelease -Pskirk.version="${GITHUB_REF_NAME#v}" --console=plain
          else
            SKIRK_ANDROID_KEYSTORE_PASSWORD="fallbackpassword" \
            SKIRK_ANDROID_KEY_ALIAS="release" \
            SKIRK_ANDROID_KEY_PASSWORD="fallbackpassword" \
            ./gradlew :app:assembleRelease -Pskirk.version="${GITHUB_REF_NAME#v}" --console=plain
          fi

      - name: Verify release APK signature
        run: |
          apksigner="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)"
          test -n "$apksigner"
          find clients/android/app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print0 \
            | while IFS= read -r -d '' apk; do
                echo "Verifying $apk"
                "$apksigner" verify --print-certs "$apk"
              done

      - name: Prepare Android release APK
        run: |
          set -euo pipefail
          apk_dir="clients/android/app/build/outputs/apk/release"
          apk_count="$(find "$apk_dir" -maxdepth 1 -type f -name '*.apk' | wc -l | tr -d ' ')"
          if [ "$apk_count" != "3" ]; then
            echo "expected exactly 3 Android release APKs, found $apk_count" >&2
            find "$apk_dir" -maxdepth 1 -type f -name '*.apk' -print >&2
            exit 1
          fi
          universal="$(find "$apk_dir" -maxdepth 1 -type f \( -name '*universal*release*.apk' -o -name 'app-release.apk' \) | sort | head -n 1)"
          arm64="$(find "$apk_dir" -maxdepth 1 -type f -name '*arm64-v8a*release*.apk' | sort | head -n 1)"
          armv7="$(find "$apk_dir" -maxdepth 1 -type f -name '*armeabi-v7a*release*.apk' | sort | head -n 1)"
          test -n "$universal"
          test -n "$arm64"
          test -n "$armv7"

          verify_apk() {
            local apk="$1"
            shift
            local expected=("$@")
            local listing
            local actual
            local want

            test -s "$apk"
            unzip -t "$apk" >/dev/null
            listing="$RUNNER_TEMP/$(basename "$apk").listing"
            zipinfo -1 "$apk" > "$listing"
            actual="$(sed -n 's#^lib/\([^/]*\)/.*#\1#p' "$listing" | sort -u | xargs)"
            want="$(printf '%s\n' "${expected[@]}" | sort | xargs)"
            if [ "$actual" != "$want" ]; then
              echo "$apk ABIs=$actual want=$want" >&2
              exit 1
            fi
            for abi in "${expected[@]}"; do
              grep -qx "lib/$abi/libskirk.so" "$listing"
              grep -qx "lib/$abi/libhev-socks5-tunnel.so" "$listing"
            done
          }

          verify_apk "$universal" arm64-v8a armeabi-v7a
          verify_apk "$arm64" arm64-v8a
          verify_apk "$armv7" armeabi-v7a

          mkdir -p dist/android
          cp "$universal" dist/android/skirk-android-universal.apk
          cp "$arm64" dist/android/skirk-android-arm64-v8a.apk
          cp "$arm64" dist/android/skirk-android-arm64.apk
          cp "$armv7" dist/android/skirk-android-armeabi-v7a.apk
          (cd dist/android && for apk in *.apk; do sha256sum "$apk" > "$apk.sha256"; done)
          (cd dist/android && sha256sum -c ./*.sha256)
          cmp -s dist/android/skirk-android-arm64-v8a.apk dist/android/skirk-android-arm64.apk

      - uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: |
            dist/android/skirk-android-universal.apk
            dist/android/skirk-android-universal.apk.sha256
            dist/android/skirk-android-arm64-v8a.apk
            dist/android/skirk-android-arm64-v8a.apk.sha256
            dist/android/skirk-android-arm64.apk
            dist/android/skirk-android-arm64.apk.sha256
            dist/android/skirk-android-armeabi-v7a.apk
            dist/android/skirk-android-armeabi-v7a.apk.sha256
          if-no-files-found: error

  windows-desktop:
    name: Build Windows Desktop Client
    runs-on: windows-2022
    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Skirk Windows sidecar
        shell: pwsh
        env:
          SKIRK_OAUTH_CLIENT_ID: ${{ secrets.SKIRK_OAUTH_CLIENT_ID }}
          SKIRK_OAUTH_CLIENT_SECRET: ${{ secrets.SKIRK_OAUTH_CLIENT_SECRET }}
          SKIRK_REQUIRE_BUILTIN_OAUTH: "0"
        run: |
          New-Item -ItemType Directory -Force clients/desktop/src-tauri/resources/sidecars/windows | Out-Null
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $commit = "${env:GITHUB_SHA}".Substring(0, 7)
          $ldflags = "-s -w -X main.version=${env:GITHUB_REF_NAME} -X main.commit=$commit -X main.date=$date"
          if ($env:SKIRK_REQUIRE_BUILTIN_OAUTH -eq "1" -and (-not $env:SKIRK_OAUTH_CLIENT_ID -or -not $env:SKIRK_OAUTH_CLIENT_SECRET)) {
            throw "release builds require SKIRK_OAUTH_CLIENT_ID and SKIRK_OAUTH_CLIENT_SECRET for the built-in device-code OAuth client"
          }
          if ($env:SKIRK_OAUTH_CLIENT_ID -or $env:SKIRK_OAUTH_CLIENT_SECRET) {
            if (-not $env:SKIRK_OAUTH_CLIENT_ID) {
              throw "SKIRK_OAUTH_CLIENT_ID must be set when SKIRK_OAUTH_CLIENT_SECRET is set"
            }
            $ldflags = "$ldflags -X main.defaultOAuthClientID=$env:SKIRK_OAUTH_CLIENT_ID -X main.defaultOAuthClientSecret=$env:SKIRK_OAUTH_CLIENT_SECRET"
          }
          go build -trimpath -ldflags "$ldflags" -o clients/desktop/src-tauri/resources/sidecars/windows/skirk-sidecar.exe ./cmd/skirk

      - name: Stage Windows VPN sidecar
        shell: pwsh
        run: |
          $version = "1.13.12"
          $expectedSha256 = "e93fc531134eb1beb4efa3c74990a24e48456098a31c03b60d5ddf17f223cf98"
          $zip = "$env:RUNNER_TEMP\sing-box-$version-windows-amd64.zip"
          $url = "https://github.com/SagerNet/sing-box/releases/download/v$version/sing-box-$version-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          $actualSha256 = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "sing-box checksum mismatch: expected $expectedSha256 got $actualSha256"
          }
          $extract = "$env:RUNNER_TEMP\sing-box"
          New-Item -ItemType Directory -Force $extract | Out-Null
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          $exe = Get-ChildItem -Path $extract -Recurse -Filter "sing-box.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "sing-box.exe was not found in $zip"
          }
          Copy-Item $exe.FullName clients/desktop/src-tauri/resources/sidecars/windows/skirk-tunnel.exe -Force
          $license = Get-ChildItem -Path $extract -Recurse -Filter "LICENSE*" | Select-Object -First 1
          if (-not $license) {
            throw "sing-box license was not found in $zip"
          }
          Copy-Item $license.FullName clients/desktop/src-tauri/resources/sidecars/windows/sing-box-LICENSE.txt -Force

      - name: Build Tauri desktop app
        working-directory: clients/desktop
        run: |
          npm ci
          npm run tauri build -- --no-bundle

      - name: Build portable zip
        run: python clients/desktop/scripts/package_windows_portable.py

      - name: Smoke Windows portable zip
        shell: pwsh
        run: |
          $zip = "dist/windows-portable/Skirk_windows_x64_portable.zip"
          $extract = "$env:RUNNER_TEMP\windows-portable-smoke"
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          $app = Join-Path $extract "Skirk\Skirk.exe"
          $sidecar = Join-Path $extract "Skirk\sidecars\windows\skirk-sidecar.exe"
          $tunnel = Join-Path $extract "Skirk\sidecars\windows\skirk-tunnel.exe"
          if (!(Test-Path $app)) { throw "Skirk.exe missing from portable zip" }
          if (!(Test-Path $sidecar)) { throw "skirk-sidecar.exe missing from portable zip" }
          if (!(Test-Path $tunnel)) { throw "skirk-tunnel.exe missing from portable zip" }
          & $sidecar version
          & $tunnel version

      - name: Prepare Windows release checksums
        shell: pwsh
        run: |
          $zip = "dist/windows-portable/Skirk_windows_x64_portable.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $zip -Leaf)" | Set-Content "$zip.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-desktop-release
          path: |
            dist/windows-portable/Skirk_windows_x64_portable.zip
            dist/windows-portable/Skirk_windows_x64_portable.zip.sha256
          if-no-files-found: error

  linux-desktop:
    name: Build Linux Desktop Client
    runs-on: ubuntu-24.04
    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Build Skirk Linux sidecar
        env:
          SKIRK_OAUTH_CLIENT_ID: ${{ secrets.SKIRK_OAUTH_CLIENT_ID }}
          SKIRK_OAUTH_CLIENT_SECRET: ${{ secrets.SKIRK_OAUTH_CLIENT_SECRET }}
          SKIRK_REQUIRE_BUILTIN_OAUTH: "0"
        run: clients/desktop/scripts/stage_sidecars.sh

      - name: Stage Linux VPN sidecar
        run: |
          version="1.13.12"
          expected_sha256="1540533adb3df24f5ad5f14b5c7ca3dbc2401b10a1c1eb278fcadcada47ec6c4"
          archive="$RUNNER_TEMP/sing-box-$version-linux-amd64.tar.gz"
          url="https://github.com/SagerNet/sing-box/releases/download/v$version/sing-box-$version-linux-amd64.tar.gz"
          curl -fsSL "$url" -o "$archive"
          actual_sha256="$(sha256sum "$archive" | awk '{print $1}')"
          if [ "$actual_sha256" != "$expected_sha256" ]; then
            echo "sing-box checksum mismatch: expected $expected_sha256 got $actual_sha256" >&2
            exit 1
          fi
          extract="$RUNNER_TEMP/sing-box-linux"
          mkdir -p "$extract" clients/desktop/src-tauri/resources/sidecars/linux
          tar -xzf "$archive" -C "$extract"
          sing_box="$(find "$extract" -type f -name sing-box -perm -111 | head -n 1)"
          test -n "$sing_box"
          cp "$sing_box" clients/desktop/src-tauri/resources/sidecars/linux/skirk-tunnel
          license="$(find "$extract" -type f -name 'LICENSE*' | head -n 1)"
          test -n "$license"
          cp "$license" clients/desktop/src-tauri/resources/sidecars/linux/sing-box-LICENSE.txt

      - name: Build Tauri desktop app
        working-directory: clients/desktop
        run: |
          npm ci
          npm run tauri build -- --no-bundle

      - name: Build portable zip
        run: python clients/desktop/scripts/package_linux_portable.py

      - name: Smoke Linux portable zip
        run: |
          set -euo pipefail
          zip="dist/linux-portable/Skirk_linux_x64_portable.zip"
          extract="$RUNNER_TEMP/linux-portable-smoke"
          unzip -q "$zip" -d "$extract"
          test -x "$extract/Skirk/Skirk"
          test -x "$extract/Skirk/sidecars/linux/skirk"
          test -x "$extract/Skirk/sidecars/linux/skirk-tunnel"
          "$extract/Skirk/sidecars/linux/skirk" version
          "$extract/Skirk/sidecars/linux/skirk-tunnel" version

      - name: Prepare Linux desktop release checksums
        run: |
          (cd dist/linux-portable && sha256sum Skirk_linux_x64_portable.zip > Skirk_linux_x64_portable.zip.sha256)

      - uses: actions/upload-artifact@v7
        with:
          name: linux-desktop-release
          path: |
            dist/linux-portable/Skirk_linux_x64_portable.zip
            dist/linux-portable/Skirk_linux_x64_portable.zip.sha256
          if-no-files-found: error

  macos-desktop:
    name: Build macOS Desktop Client (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            goarch: arm64
            rust_target: aarch64-apple-darwin
            file_arch: arm64
          - arch: x64
            runner: macos-15-intel
            goarch: amd64
            rust_target: x86_64-apple-darwin
            file_arch: x86_64
    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build Skirk macOS sidecar
        env:
          SKIRK_OAUTH_CLIENT_ID: ${{ secrets.SKIRK_OAUTH_CLIENT_ID }}
          SKIRK_OAUTH_CLIENT_SECRET: ${{ secrets.SKIRK_OAUTH_CLIENT_SECRET }}
          SKIRK_REQUIRE_BUILTIN_OAUTH: "0"
        run: |
          set -euo pipefail
          mkdir -p clients/desktop/src-tauri/resources/sidecars/macos
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          commit="${GITHUB_SHA::7}"
          ldflags="-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${commit} -X main.date=${date}"
          if [ "${SKIRK_REQUIRE_BUILTIN_OAUTH}" = "1" ] && { [ -z "${SKIRK_OAUTH_CLIENT_ID}" ] || [ -z "${SKIRK_OAUTH_CLIENT_SECRET}" ]; }; then
            echo "release builds require SKIRK_OAUTH_CLIENT_ID and SKIRK_OAUTH_CLIENT_SECRET for the built-in device-code OAuth client" >&2
            exit 1
          fi
          if [ -n "${SKIRK_OAUTH_CLIENT_ID}" ] || [ -n "${SKIRK_OAUTH_CLIENT_SECRET}" ]; then
            if [ -z "${SKIRK_OAUTH_CLIENT_ID}" ] || [ -z "${SKIRK_OAUTH_CLIENT_SECRET}" ]; then
              echo "SKIRK_OAUTH_CLIENT_ID and SKIRK_OAUTH_CLIENT_SECRET must be set together" >&2
              exit 1
            fi
            ldflags="${ldflags} -X main.defaultOAuthClientID=${SKIRK_OAUTH_CLIENT_ID} -X main.defaultOAuthClientSecret=${SKIRK_OAUTH_CLIENT_SECRET}"
          fi
          GOOS=darwin GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 go build -trimpath -ldflags "${ldflags}" -o clients/desktop/src-tauri/resources/sidecars/macos/skirk ./cmd/skirk
          chmod +x clients/desktop/src-tauri/resources/sidecars/macos/skirk

      - name: Build Tauri macOS app
        working-directory: clients/desktop
        run: |
          npm ci
          npm run tauri build -- --target "${{ matrix.rust_target }}" --bundles app --no-sign

      - name: Smoke macOS bundle
        run: |
          set -euo pipefail
          app="$(find "clients/desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos" -name 'Skirk.app' -type d | head -n 1)"
          test -d "$app"
          plutil -lint "$app/Contents/Info.plist"
          app_exe="$app/Contents/MacOS/skirk-desktop"
          sidecar="$app/Contents/Resources/resources/sidecars/macos/skirk"
          test -x "$app_exe"
          test -x "$sidecar"
          file "$app_exe" | grep -F "${{ matrix.file_arch }}"
          file "$sidecar" | grep -F "${{ matrix.file_arch }}"
          "$sidecar" version

      - name: Package macOS app zip
        run: |
          set -euo pipefail
          app="$(find "clients/desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos" -name 'Skirk.app' -type d | head -n 1)"
          out_dir="dist/macos-${{ matrix.arch }}"
          mkdir -p "$out_dir"
          ditto -c -k --sequesterRsrc --keepParent "$app" "$out_dir/Skirk_macos_${{ matrix.arch }}.app.zip"
          (cd "$out_dir" && shasum -a 256 "Skirk_macos_${{ matrix.arch }}.app.zip" > "Skirk_macos_${{ matrix.arch }}.app.zip.sha256")

      - uses: actions/upload-artifact@v7
        with:
          name: macos-desktop-${{ matrix.arch }}-release
          path: |
            dist/macos-${{ matrix.arch }}/Skirk_macos_${{ matrix.arch }}.app.zip
            dist/macos-${{ matrix.arch }}/Skirk_macos_${{ matrix.arch }}.app.zip.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - release
      - android
      - windows-desktop
      - linux-desktop
      - macos-desktop
    permissions:
      actions: read
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p dist-release
          gh run download "${GITHUB_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --dir dist-release \
            --name cli-release \
            --name android-release \
            --name windows-desktop-release \
            --name linux-desktop-release \
            --name macos-desktop-arm64-release \
            --name macos-desktop-x64-release
          find dist-release -mindepth 2 -type f -print0 | while IFS= read -r -d '' file; do
            mv "$file" "dist-release/$(basename "$file")"
          done
          find dist-release -mindepth 1 -type d -empty -delete

      - name: Generate artifact checksums
        run: |
          (cd dist-release && find . -type f ! -name 'SHA256SUMS' ! -name '*.sha256' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)

      - name: Generate artifact provenance attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            dist-release/skirk-android-arm64.apk
            dist-release/skirk-android-arm64-v8a.apk
            dist-release/skirk-android-armeabi-v7a.apk
            dist-release/skirk-android-universal.apk
            dist-release/skirk-linux-amd64.tar.gz
            dist-release/skirk-linux-arm64.tar.gz
            dist-release/skirk-windows-amd64.zip
            dist-release/Skirk_linux_x64_portable.zip
            dist-release/Skirk_macos_arm64.app.zip
            dist-release/Skirk_macos_x64.app.zip
            dist-release/Skirk_windows_x64_portable.zip

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t assets < <(find dist-release -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no release assets found" >&2
            exit 1
          fi
          stale_android_asset="skirk-${GITHUB_REF_NAME}-android-arm64.apk"
          stale_android_checksum="${stale_android_asset}.sha256"
          release_notes=$'Assets:\n- Skirk_windows_x64_portable.zip: Windows GUI portable app with proxy, system proxy, and VPN modes. Extract it and open Skirk.exe.\n- Skirk_linux_x64_portable.zip: Linux GUI portable app with proxy and VPN modes, local/LAN SOCKS, and local/LAN HTTP proxy endpoints. Extract it and run ./Skirk; VPN mode needs root or CAP_NET_ADMIN.\n- Skirk_macos_arm64.app.zip: macOS Apple Silicon desktop app, proxy mode only in this release.\n- Skirk_macos_x64.app.zip: macOS Intel desktop app, proxy mode only in this release.\n- skirk-windows-amd64.zip: Windows CLI-only build for PowerShell/manual use.\n- skirk-android-universal.apk: release-signed Android APK for arm64-v8a and armeabi-v7a devices.\n- skirk-android-arm64-v8a.apk: smaller Android APK for 64-bit ARM devices.\n- skirk-android-armeabi-v7a.apk: smaller Android APK for 32-bit ARM devices.\n- skirk-android-arm64.apk: compatibility alias for skirk-android-arm64-v8a.apk.\n\nIntegrity:\n- SHA256SUMS covers the published archives/APKs.\n- GitHub artifact attestations are generated for the APKs and archives; verify with `gh attestation verify <asset> -R ShahabSL/Skirk`.\n'
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            existing_assets="$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')"
            for stale in "${stale_android_asset}" "${stale_android_checksum}"; do
              if grep -Fxq "${stale}" <<<"${existing_assets}"; then
                gh release delete-asset "${GITHUB_REF_NAME}" "${stale}" -y
              fi
            done
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
            gh release edit "${GITHUB_REF_NAME}" --notes "$release_notes"
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" --title "${GITHUB_REF_NAME}" --generate-notes --notes "$release_notes"
          fi
          published_assets="$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')"
          for asset in ${published_assets}; do
            case "${asset}" in
              skirk-v*-android-arm64.apk|skirk-v*-android-arm64.apk.sha256)
                echo "stale versioned Android asset remains: ${asset}" >&2
                exit 1
                ;;
            esac
          done
